<section id="contact" class="py-16">
  <div class="container mx-auto px-4 lg:px-5">
    <app-section-header [badge]="badge" [title]="title" [description]="description">
      <svg class="size-4" viewBox="0 0 512 512">
        <path
          fill="currentColor"
          d="M128 320L24.5 320c-24.9 0-40.2-27.1-27.4-48.5L50 183.3C58.7 168.8 74.3 160 91.2 160l95 0c76.1-128.9 189.6-135.4 265.5-124.3 12.8 1.9 22.8 11.9 24.6 24.6 11.1 75.9 4.6 189.4-124.3 265.5l0 95c0 16.9-8.8 32.5-23.3 41.2l-88.2 52.9c-21.3 12.8-48.5-2.6-48.5-27.4L192 384c0-35.3-28.7-64-64-64l-.1 0zM400 160a48 48 0 1 0 -96 0 48 48 0 1 0 96 0z"
        ></path>
      </svg>
    </app-section-header>

    <div class="border border-gray-200 rounded-3xl shadow max-w-6xl mx-auto grid grid-cols-12">
      <div class="col-span-12 lg:col-span-8 p-8 text-primary-dark">
        <h3 class="font-bold mb-4 text-lg">Get Your Free Consultation</h3>

        <p class="mb-8">
          Fill out the form and we'll get back to you within 24 hours with a personalized proposal.
        </p>

        <app-contact-form />
      </div>

      <div class="col-span-12 lg:col-span-4">
        <app-why-choose-us />
      </div>
    </div>
  </div>
</section>
