<section id="clients" class="bg-gradient-light py-16">
  <div class="container mx-auto px-4 px-lg-5">
    <app-section-header [badge]="badge" [title]="title" [description]="description">
      <svg class="size-4" viewBox="0 0 512 512">
        <path
          fill="currentColor"
          d="M241 87.1l15 20.7 15-20.7C296 52.5 336.2 32 378.9 32 452.4 32 512 91.6 512 165.1l0 2.6c0 112.2-139.9 242.5-212.9 298.2-12.4 9.4-27.6 14.1-43.1 14.1s-30.8-4.6-43.1-14.1C139.9 410.2 0 279.9 0 167.7l0-2.6C0 91.6 59.6 32 133.1 32 175.8 32 216 52.5 241 87.1z"
        ></path>
      </svg>
    </app-section-header>

    <swiper-container
      class="max-w-5xl mx-auto"
      slides-per-view="1"
      loop="true"
      space-between="100"
      autoplay-delay="3000"
    >
      @for (testimonial of testimonials; track $index) {
        <swiper-slide>
          <app-testimonial-card
            [name]="testimonial.name"
            [position]="testimonial.position"
            [feedback]="testimonial.feedback"
          ></app-testimonial-card>
        </swiper-slide>
      }
    </swiper-container>
  </div>
</section>
