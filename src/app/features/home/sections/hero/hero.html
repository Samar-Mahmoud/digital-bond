<section id="hero" class="bg-gradient-light py-16">

      <div class="col-span-12 md:col-span-7">

          <svg width="0.875rem" height="0.875rem" viewBox="0 0 512 512">
            <path

            <span class="block text-primary">That Drive</span>
            <span class="block bg-clip-text text-transparent">Growth</span>

        <div class="size-64 lg:size-87 relative">
          <img ngSrc="assets/logo.gif" alt="Logo" priority fill />
        </div>
      </div>

    <!-- Stats -->
    <app-stats></app-stats>
