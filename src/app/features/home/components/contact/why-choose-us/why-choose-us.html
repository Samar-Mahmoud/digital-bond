<div
  class="h-full flex flex-col gap-8 p-8 rounded-b-3xl lg:rounded-br-3xl lg:rounded-bl-none lg:rounded-tr-3xl text-white bg-gradient"
>
  <h4 class="font-bold mb-4 text-xl md:text-3xl lg:text-lg">Why Choose Digital Bond?</h4>

  <ul class="text-white space-y-8">
    @for (item of whyChooseUs; track $index) {
      <li class="text-sm flex">
        <div class="size-12 rounded-xl shrink-0 bg-white/25 flex me-3">
          <svg class="m-auto size-4" [attr.viewBox]="item.icon.viewBox" aria-hidden="true">
            <path fill="currentColor" [attr.d]="item.icon.path"></path>
          </svg>
        </div>
        <div>
          <h5 class="font-semibold mb-2">{{ item.title }}</h5>
          <p class="opacity-75 text-sm">
            {{ item.description }}
          </p>
        </div>
      </li>
    }
  </ul>

  <div class="border-t border-white/20 pt-8">
    <h5 class="font-semibold mb-3">Direct Contact</h5>

    <ul class="space-y-3">
      <li class="flex items-center gap-3">
        <svg class="size-4" viewBox="0 0 512 512">
          <path
            fill="currentColor"
            d="M160.2 25C152.3 6.1 131.7-3.9 112.1 1.4l-5.5 1.5c-64.6 17.6-119.8 80.2-103.7 156.4 37.1 175 174.8 312.7 349.8 349.8 76.3 16.2 138.8-39.1 156.4-103.7l1.5-5.5c5.4-19.7-4.7-40.3-23.5-48.1l-97.3-40.5c-16.5-6.9-35.6-2.1-47 11.8l-38.6 47.2C233.9 335.4 177.3 277 144.8 205.3L189 169.3c13.9-11.3 18.6-30.4 11.8-47L160.2 25z"
          ></path>
        </svg>
        <span class="text-white">+1 (555) 123-4567</span>
      </li>
      <li class="flex items-center gap-3">
        <svg class="size-4" viewBox="0 0 512 512">
          <path
            fill="currentColor"
            d="M48 64c-26.5 0-48 21.5-48 48 0 15.1 7.1 29.3 19.2 38.4l208 156c17.1 12.8 40.5 12.8 57.6 0l208-156c12.1-9.1 19.2-23.3 19.2-38.4 0-26.5-21.5-48-48-48L48 64zM0 196L0 384c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-188-198.4 148.8c-34.1 25.6-81.1 25.6-115.2 0L0 196z"
          ></path>
        </svg>
        <span class="text-white">hello@digitalbond.com</span>
      </li>
      <li class="flex items-center gap-3">
        <svg class="size-4" viewBox="0 0 384 512">
          <path
            fill="currentColor"
            d="M0 188.6C0 84.4 86 0 192 0S384 84.4 384 188.6c0 119.3-120.2 262.3-170.4 316.8-11.8 12.8-31.5 12.8-43.3 0-50.2-54.5-170.4-197.5-170.4-316.8zM192 256a64 64 0 1 0 0-128 64 64 0 1 0 0 128z"
          ></path>
        </svg>
        <span class="text-white">San Francisco, CA</span>
      </li>
    </ul>
  </div>
</div>
