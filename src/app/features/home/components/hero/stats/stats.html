<div
  id="stats"
  class="grid grid-cols-2 lg:grid-cols-4 gap-4 items-center text-center mt-8 border border-gray-200 rounded-2xl"
>
  @for (stat of stats; track stat.label; let i = $index) {
    <div class="flex flex-col gap-0.5 hover:bg-gradient group rounded-lg transition-all p-8">
      <span
        class="text-3xl leading-tight font-bold text-primary group-hover:text-white transition-colors"
        >{{ animatedValues[i]() }}+</span
      >
      <span class="text-gray-700 group-hover:text-white transition-colors font-medium">{{
        stat.label
      }}</span>
    </div>
  }
</div>
