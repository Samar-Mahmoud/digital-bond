<header
  class="fixed backdrop-blur-md border-b border-gray-200 z-10 top-0 w-full"
  [ngClass]="
    isScrolled()
      ? 'bg-[linear-gradient(to_right_bottom,#ffffff_0%,#f6e4cf_100%)] shadow-sm'
      : 'bg-white/95'
  "
>
  <nav class="container mx-auto px-4 lg:px-8 py-3">
    <div class="flex gap-5 items-center">
      <div class="flex items-center gap-3">
        <div class="size-8 lg:size-10 rounded-xl bg-gradient shrink-0 text-white flex">
          <svg
            class="m-auto size-4 lg:size-5"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 576 512"
          >
            <path
              fill="rgb(255, 255, 255)"
              d="M360.8 1.2c-17-4.9-34.7 5-39.6 22l-128 448c-4.9 17 5 34.7 22 39.6s34.7-5 39.6-22l128-448c4.9-17-5-34.7-22-39.6zm64.6 136.1c-12.5 12.5-12.5 32.8 0 45.3l73.4 73.4-73.4 73.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l96-96c12.5-12.5 12.5-32.8 0-45.3l-96-96c-12.5-12.5-32.8-12.5-45.3 0zm-274.7 0c-12.5-12.5-32.8-12.5-45.3 0l-96 96c-12.5 12.5-12.5 32.8 0 45.3l96 96c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L77.3 256 150.6 182.6c12.5-12.5 12.5-32.8 0-45.3z"
            />
          </svg>
        </div>
        <h2 class="text-xl lg:text-2xl font-bold text-gradient">Digital Bond</h2>
      </div>

      <button class="lg:hidden ms-auto text-primary flex cursor-pointer" (click)="toggleMenu()">
        <svg
          class="m-auto"
          width="1.5rem"
          height="1.25rem"
          data-prefix="fas"
          data-icon="bars"
          role="img"
          viewBox="0 0 448 512"
          aria-hidden="true"
          data-fa-i2svg=""
        >
          <path
            fill="currentColor"
            d="M0 96C0 78.3 14.3 64 32 64l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 128C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 288c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32L32 448c-17.7 0-32-14.3-32-32s14.3-32 32-32l384 0c17.7 0 32 14.3 32 32z"
          ></path>
        </svg>
      </button>

      <div class="hidden lg:flex flex-1 items-center">
        <ul class="flex gap-8 px-4 py-3 text-gray-700">
          <li>
            <a href="#hero" class="py-2 font-medium" [class.active]="activeSection() === 'hero'"
              >Home</a
            >
          </li>
          <li>
            <a
              href="#services"
              class="py-2 font-medium"
              [class.active]="activeSection() === 'services'"
              >Services</a
            >
          </li>
          <li>
            <a
              href="#clients"
              class="py-2 font-medium"
              [class.active]="activeSection() === 'clients'"
              >Testimonials</a
            >
          </li>
          <li>
            <a
              href="#contact"
              class="py-2 font-medium"
              [class.active]="activeSection() === 'contact'"
              >Contact Us</a
            >
          </li>
        </ul>

        <a
          href="#contact"
          class="ms-auto rounded-full bg-gradient text-white font-medium px-4 py-2 hover:btn-shadow transition-shadow"
        >
          Get Started
        </a>
      </div>
    </div>

    @if (isMenuOpen()) {
      <!-- Mobile Menu -->
      <div class="lg:hidden flex flex-col py-4 space-y-4 text-gray-700">
        <a href="#hero" class="font-medium">Home</a>
        <a href="#services" class="font-medium">Services</a>
        <a href="#clients" class="font-medium">Testimonials</a>
        <a href="#contact" class="font-medium">Contact Us</a>
      </div>
    }
  </nav>
</header>
