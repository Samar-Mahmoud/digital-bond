<header class="flex flex-col items-center gap-4 mb-20">
  <span class="px-3 py-2 bg-primary text-white rounded-full flex items-center justify-center gap-2">
    <!-- Icon -->
    <ng-content />

    <span class="text-xs md:text-sm font-medium">{{ badge() }}</span>
  </span>

  <h2 class="text-3xl lg:text-5xl font-bold text-center">
    <span class="text-primary">{{ title()[0] }} </span>
    <span class="text-gradient">{{ title()[1] }}</span>
  </h2>

  <p class="text-gray-700 text-center max-w-2xl mx-auto font-medium">
    {{ description() }}
  </p>
</header>
